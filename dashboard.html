<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Converter Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <div class="top-bar">
        <button id="logoutBtn">Logout</button>
    </div>

    <div class="header">
        <h1>Crypto Converter</h1>
        <p>Convert cryptocurrency into your preferred currency using live CoinGecko data.</p>
    </div>

    <div class="form-group">
        <label for="amount">Amount</label>
        <input
            type="number"
            id="amount"
            placeholder="Enter Amount"
            min="1"
        >
    </div>

    <div class="form-group">
        <label for="crypto">Select Cryptocurrency</label>
        <select id="crypto">
            <option value="bitcoin">Bitcoin (BTC)</option>
            <option value="ethereum">Ethereum (ETH)</option>
            <option value="dogecoin">Dogecoin (DOGE)</option>
            <option value="litecoin">Litecoin (LTC)</option>
            <option value="solana">Solana (SOL)</option>
        </select>
    </div>

    <div class="form-group">
        <label for="currency">Select Currency</label>
        <select id="currency">
            <option value="usd">US Dollar (USD)</option>
            <option value="inr">Indian Rupee (INR)</option>
            <option value="eur">Euro (EUR)</option>
            <option value="gbp">British Pound (GBP)</option>
            <option value="jpy">Japanese Yen (JPY)</option>
        </select>
    </div>

    <button id="convertBtn">Convert</button>

    <div id="result">
        <h3>Conversion Result</h3>
        <p>Enter an amount and click <strong>Convert</strong>.</p>
    </div>

    <button id="saveBtn"> Save Favorite Pair</button>

    <div class="favorites-section">
        <h2>Favorite Pairs</h2>
        <ul id="favorites">
            <li>No favorite pairs added.</li>
        </ul>
    </div>

</div>

<script src="dashboard.js"></script>

</body>
</html>
